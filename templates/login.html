<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hemoglobin Analyzer</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #ff4b2b;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
            animation: float 15s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -50px) scale(1.2); }
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { margin-bottom: 2rem; font-weight: 300; }
        h2 span {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .input-group { margin-bottom: 1.2rem; }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.4);
        }

        .action-links {
            display: flex;
            justify-content: space-between;
            margin: 1rem 0;
            font-size: 0.85rem;
        }

        .action-links a { color: var(--text-muted); text-decoration: none; }
        .action-links a:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="ambient-orb" style="width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px;"></div>
    <div class="ambient-orb" style="width: 300px; height: 300px; background: var(--secondary); bottom: -50px; right: -50px;"></div>

    <div class="login-card">
        <h2>
            <span>Secure Terminal</span>
            Hemoglobin Analyzer
        </h2>

        <form id="loginForm" action="dashboard.html" method="GET">
            <div class="input-group">
                <input type="text" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>

            <div class="action-links">
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" id="submitBtn" class="btn-login">Initialize Session</button>
        </form>

        <div style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="#" style="color: var(--primary); text-decoration: none;">Create Request</a>
        </div>
    </div>

    <script>
        // Optional: Adding a nice transition effect
        document.getElementById('loginForm').onsubmit = function() {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Verifying Access...";
            btn.style.opacity = "0.7";
            // The form will naturally redirect to dashboard.html after this
        };
    </script>

</body>
</html>
